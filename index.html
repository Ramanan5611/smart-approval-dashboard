<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Approval Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      
      /* Dynamic animations */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      @keyframes morph {
        0%, 100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
        34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
        67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
      }

      .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .float { animation: float 3s ease-in-out infinite; }
      .morph { animation: morph 8s ease-in-out infinite; }
      
      .glass {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      
      .glass-card {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.12);
      }

      .gradient-mesh {
        background-color: #f0f4f8;
        background-image: 
          radial-gradient(at 0% 0%, hsla(210,100%,92%,1) 0, transparent 50%), 
          radial-gradient(at 50% 0%, hsla(225,100%,88%,1) 0, transparent 50%), 
          radial-gradient(at 100% 0%, hsla(240,100%,92%,1) 0, transparent 50%),
          radial-gradient(at 30% 60%, hsla(200,100%,90%,1) 0, transparent 40%),
          radial-gradient(at 70% 50%, hsla(260,100%,94%,1) 0, transparent 50%);
        background-attachment: fixed;
      }
      
      .hover-lift {
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      
      .hover-lift:hover {
        transform: translateY(-5px) scale(1.01);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      }
      
      .card-hover {
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
        overflow: hidden;
      }
      
      .card-hover:hover {
        transform: translateY(-8px);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.1);
      }
      
      .table-row-hover {
        transition: all 0.2s ease;
      }
      
      .table-row-hover:hover {
        background-color: #f8fafc;
        transform: scale(1.01);
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

</html>
